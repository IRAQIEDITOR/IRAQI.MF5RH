<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عراقي | Pro Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f3ff;
            --bg-dark: #05000a;
            --robot-color: #9d00ff;
            --robot-size: 45px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            padding: 90px 20px 50px; 
            color: #fff;
            overflow-x: hidden; 
            position: relative;
            font-family: 'Tajawal', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* تأثير المطر الخلفي */
        #rainCanvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
            opacity: 0.5;
        }

        /* الحاوية الرئيسية */
        .container {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(15, 0, 25, 0.4) 100%);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(157, 0, 255, 0.2); 
            border-radius: 30px; padding: 50px 30px;
            width: 100%; max-width: 440px; text-align: center;
            position: relative; z-index: 100;
            box-shadow: 0 0 40px rgba(157, 0, 255, 0.1);
        }

        .logo-container {
            width: 140px; height: 140px; margin: 0 auto 15px; border-radius: 50%; padding: 4px;
            background: var(--neon-purple); box-shadow: 0 0 25px var(--neon-purple);
        }
        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #05000a; }

        .links-wrapper { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .link-btn {
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #fff; background: rgba(0, 0, 0, 0.5);
            padding: 18px; border-radius: 15px; font-size: 17px; font-weight: 700;
            border: 1px solid rgba(157, 0, 255, 0.3); transition: 0.3s;
        }
        .link-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--neon-purple); }

        /* الروبوت السايبر */
        .robot-wrapper { 
            position: absolute; top: 45px; left: 50%; transform: translateX(-50%);
            width: var(--robot-size); height: var(--robot-size); z-index: 9999; 
        }
        .robot-mesh { position: relative; width: 100%; height: 100%; animation: robotIdle 3s ease-in-out infinite; }
        .robot-body { width: 100%; height: 80%; background: linear-gradient(135deg, #2b004a, var(--robot-color)); border-radius: 12px; position: relative; box-shadow: 0 0 15px var(--robot-color); }
        .robot-eye { width: 6px; height: 6px; background: #00f3ff; border-radius: 50%; position: absolute; top: 30%; box-shadow: 0 0 8px #00f3ff; animation: blink 4s infinite; }
        .eye-left { left: 25%; } .eye-right { right: 25%; }
        .robot-propeller { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.8); position: absolute; top: -6px; border-radius: 2px; animation: spinBlade 0.1s linear infinite; }

        @keyframes robotIdle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes spinBlade { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        @keyframes blink { 0%, 96%, 98% { transform: scaleY(1); } 97% { transform: scaleY(0.1); } }

        .copy-box {
            background: rgba(255, 255, 255, 0.03); border: 1px dashed var(--neon-blue);
            border-radius: 10px; padding: 15px; margin: 10px 0; cursor: pointer; color: #00f3ff;
        }
    </style>
</head>
<body>

    <canvas id="rainCanvas"></canvas>

    <div id="cyber-robot" class="robot-wrapper">
        <div class="robot-mesh">
            <div class="robot-body">
                <div class="robot-eye eye-left"></div>
                <div class="robot-eye eye-right"></div>
            </div>
            <div class="robot-propeller"></div>
        </div>
    </div>

    <div class="container">
        <div class="logo-container"><img src="lg.png" alt="Logo" class="logo"></div>
        <h2 style="margin-bottom: 10px;">أهلاً بك في Pro Hub</h2>
        
        <div class="links-wrapper">
            <a href="store.html" class="link-btn" style="background: linear-gradient(90deg, #4a00e0, #8e2de2);">🛒 Online Store</a>
            <a href="https://t.me/moamdbt" target="_blank" class="link-btn">Telegram Channel</a>
            <div class="copy-box" onclick="copyLink()">📋 https://t.me/mf5rh_777</div>
            <a href="https://www.instagram.com/lr.7y" target="_blank" class="link-btn">Instagram</a>
        </div>
    </div>

    <script>
        function copyLink() {
            const link = "https://t.me/mf5rh_777";
            navigator.clipboard.writeText(link).then(() => {
                alert("تم نسخ الرابط بنجاح");
            });
        }

        // تأثير المطر
        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        for(let i=0; i<50; i++) {
            particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#9d00ff";
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
                ctx.fill();
                p.y += 1;
                if(p.y > canvas.height) p.y = 0;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
