<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRAQI | Pro Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f3ff;
            --neon-green-dark: #004d00;
            --bg-dark: #05000a;
            --robot-color: #9d00ff;
            --robot-red: #ff003c;
            --robot-size: 45px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            padding: 90px 20px 50px; 
            color: #fff;
            overflow-x: hidden; 
            position: relative;
            font-family: 'Tajawal', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            transform: translateZ(0);
        }

        /* --- Background Effects --- */
        #rainCanvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none; opacity: 0; transition: opacity 1s ease-in; 
        }

        .lightning {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(200, 0, 255, 0.15); opacity: 0;
            pointer-events: none; z-index: 9998; transition: opacity 0.1s;
        }

        /* --- Corner Icons --- */
        .bg-icon { position: absolute; z-index: 150; width: 120px; pointer-events: none; opacity: 0; }
        .bg-ae { top: 20px; right: 20px; filter: drop-shadow(0 0 25px var(--neon-purple)); animation: fadeInIcon 0.5s forwards 0.2s, float 6s infinite 0.5s; }
        .bg-am { bottom: 85px; left: 20px; border-radius: 50%; filter: drop-shadow(0 0 25px var(--neon-green-dark)); animation: fadeInIcon 0.5s forwards 0.2s, float-rev 7s infinite 0.5s; }
        
        @keyframes fadeInIcon { to { opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes float-rev { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(15px); } }

        /* --- Container --- */
        .container {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(15, 0, 25, 0.4) 100%);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(157, 0, 255, 0.2); border-radius: 30px; padding: 50px 30px;
            width: 100%; max-width: 440px; text-align: center; position: relative; z-index: 100;
            box-shadow: 0 0 40px rgba(157, 0, 255, 0.1); margin: 0 auto; opacity: 0; transform: scale(0.95);
            animation: containerReveal 0.4s forwards;
        }
        @keyframes containerReveal { to { opacity: 1; transform: scale(1); } }

        #innerBouncingCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0; transition: opacity 1s; }

        .logo-container, .title-container, .crystal-panel, .link-btn, .visitor-badge-container, .copy-box { 
            position: relative; z-index: 10; opacity: 0; animation: fadeInUpBlur 0.5s forwards;
        }
        @keyframes fadeInUpBlur {
            0% { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .logo-container { animation-delay: 0.1s; width: 140px; height: 140px; margin: 0 auto 15px; border-radius: 50%; padding: 4px; background: var(--neon-purple); box-shadow: 0 0 25px var(--neon-purple); }
        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #05000a; }

        .title-container { animation-delay: 0.2s; margin: 15px auto 5px; }
        .title-img { width: 85%; max-width: 250px; display: block; margin: 0 auto; filter: drop-shadow(0 0 25px rgba(157, 0, 255, 0.9)); }
        .glitch { animation: glitch 5s infinite; } 
        @keyframes glitch { 0%, 92%, 100% { transform: translate(0); } 94% { transform: translate(2px, -2px); } 96% { transform: translate(-2px, 2px); } }

        .crystal-panel { animation-delay: 0.3s; margin: 5px auto 30px; padding: 12px 25px; background: rgba(255, 255, 255, 0.02); border-radius: 12px; display: inline-block; }
        .crystal-text { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 14px; background: linear-gradient(180deg, #ffffff 0%, #9aa0a6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .links-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .link-btn {
            display: flex; align-items: center; justify-content: center; text-decoration: none; color: #fff; background: rgba(0, 0, 0, 0.5);
            padding: 18px; border-radius: 15px; font-size: 17px; font-weight: 700; border: 1px solid rgba(157, 0, 255, 0.3); transition: 0.2s;
        }
        .link-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px #b400ff; border-color: var(--neon-purple); }
        .btn-icon { width: 44px; height: 44px; margin-right: 12px; object-fit: contain; }

        .copy-box { background: rgba(255, 255, 255, 0.03); border: 1px dashed rgba(0, 243, 255, 0.3); border-radius: 10px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; animation-delay: 0.65s; transition: 0.3s; }
        .copy-box:hover { border-color: #00f3ff; background: rgba(0, 243, 255, 0.05); }

        .visitor-badge { margin-top: 35px; padding: 10px 25px; font-size: 14px; background: rgba(255, 255, 255, 0.03); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.15); animation-delay: 0.8s; }
        .visitor-badge span { color: #d866ff; font-weight: 900; }

        /* --- Robot --- */
        .robot-wrapper { position: absolute; top: 45px; left: 50%; margin-left: -22.5px; width: var(--robot-size); height: var(--robot-size); z-index: 9999; opacity: 0; transition: opacity 0.5s; cursor: grab; }
        .robot-body { width: 100%; height: 80%; background: var(--robot-color); border-radius: 12px; position: relative; box-shadow: 0 0 15px var(--robot-color); }
        .robot-eye { width: 6px; height: 6px; background: #00f3ff; border-radius: 50%; position: absolute; top: 30%; box-shadow: 0 0 8px #00f3ff; }
        .eye-left { left: 25%; } .eye-right { right: 25%; }
        .robot-propeller { width: 60%; height: 4px; background: #fff; position: absolute; top: -6px; left: 20%; animation: spinBlade 0.1s linear infinite; }
        @keyframes spinBlade { from { transform: rotateY(0); } to { transform: rotateY(360deg); } }
        .light-beam { position: absolute; top: 50%; left: 22px; height: 2px; background: #00f3ff; width: 0; opacity: 0; transition: 0.3s; box-shadow: 0 0 15px #00f3ff; pointer-events: none; }
        .btn-blue-reaction { border-color: #00f3ff !important; box-shadow: 0 0 20px #00f3ff !important; }
    </style>
</head>
<body>

    <canvas id="rainCanvas"></canvas>
    <div class="lightning" id="flash"></div>

    <div id="cyber-robot" class="robot-wrapper">
        <div class="robot-body">
            <div class="robot-eye eye-left"></div>
            <div class="robot-eye eye-right"></div>
            <div class="robot-propeller"></div>
            <div id="robot-laser" class="light-beam"></div>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <canvas id="innerBouncingCanvas"></canvas>
        <div class="logo-container"><img src="lg.png" alt="Avatar" class="logo"></div>
        <div class="title-container"><img src="vr.png" alt="iraqi" class="title-img glitch"></div>
        <div class="crystal-panel"><span class="crystal-text">اهلاً بالجميع</span></div>

        <div class="links-wrapper">
            <a href="store.html" class="link-btn">🛒 Online Store</a>
            <a href="https://www.tiktok.com/@lr.y7_" target="_blank" class="link-btn"><img src="tik.png" class="btn-icon"> TikTok</a>
            <a href="https://t.me/moamdbt" target="_blank" class="link-btn" id="telegram-btn"><img src="tly.png" class="btn-icon"> Telegram</a>
            
            <div class="copy-box" onclick="copyLink()">
                <span id="linkText">https://t.me/mf5rh_777</span>
                <span>📋</span>
            </div>

            <a href="https://www.instagram.com/lr.7y" target="_blank" class="link-btn"><img src="ins.png" class="btn-icon"> Instagram</a>
        </div>

        <div class="visitor-badge-container">
            <div class="visitor-badge">👁 Visitors: <span id="vCount">0</span></div>
        </div>
    </div>

    <script>
        function copyLink() {
            const text = "https://t.me/mf5rh_777";
            navigator.clipboard.writeText(text).then(() => {
                const el = document.getElementById('linkText');
                const old = el.innerText;
                el.innerText = "تم النسخ! ✅";
                setTimeout(() => el.innerText = old, 2000);
            });
        }

        window.addEventListener('load', () => {
            // Rain Logic
            const rain = document.getElementById('rainCanvas');
            const ctx = rain.getContext('2d');
            rain.width = window.innerWidth; rain.height = window.innerHeight;
            rain.style.opacity = 1;
            const drops = Array.from({length: 40}, () => ({x: Math.random()*rain.width, y: Math.random()*rain.height, v: Math.random()*2+1}));
            function drawRain() {
                ctx.clearRect(0,0,rain.width, rain.height);
                ctx.fillStyle = "rgba(157, 0, 255, 0.2)";
                drops.forEach(d => {
                    ctx.fillRect(d.x, d.y, 2, 5);
                    d.y += d.v; if(d.y > rain.height) d.y = -5;
                });
                requestAnimationFrame(drawRain);
            } drawRain();

            // Visitor Count
            const countEl = document.getElementById('vCount');
            let count = localStorage.getItem('visit_count') || 1000;
            count = parseInt(count) + 1;
            localStorage.setItem('visit_count', count);
            countEl.innerText = count.toLocaleString();

            // Robot Animation
            const robot = document.getElementById('cyber-robot');
            const laser = document.getElementById('robot-laser');
            const btn = document.getElementById('telegram-btn');
            robot.style.opacity = 1;

            setTimeout(() => {
                const b = btn.getBoundingClientRect();
                const r = robot.getBoundingClientRect();
                const dx = b.left - r.left - 40;
                const dy = b.top - r.top;
                
                robot.style.transition = "transform 1.5s ease-in-out";
                robot.style.transform = `translate(${dx}px, ${dy}px)`;

                setTimeout(() => {
                    laser.style.opacity = 1; laser.style.width = "100px";
                    btn.classList.add('btn-blue-reaction');
                    setTimeout(() => {
                        laser.style.opacity = 0; btn.classList.remove('btn-blue-reaction');
                        robot.style.transform = "translate(0,0)";
                    }, 1000);
                }, 1600);
            }, 1000);
        });
    </script>
</body>
</html>
