<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عراقي | Pro Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f3ff;
            --neon-green-dark: #004d00;
            --bg-dark: #05000a;
            --robot-color: #9d00ff;
            --robot-red: #ff003c;
            --robot-size: 45px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            padding: 90px 20px 50px; 
            color: #fff;
            overflow-x: hidden; 
            position: relative;
            font-family: 'Tajawal', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Background Effects */
        #rainCanvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
            opacity: 0; transition: opacity 1s ease-in; 
        }

        /* Corner Icons */
        .bg-icon {
            position: absolute; z-index: 150; width: 120px; pointer-events: none; opacity: 0; 
        }
        .bg-ae { top: 20px; right: 20px; filter: drop-shadow(0 0 25px var(--neon-purple)); animation: fadeInIcon 0.5s forwards 0.2s, float 6s infinite 0.5s; }
        .bg-am { bottom: 85px; left: 20px; border-radius: 50%; filter: drop-shadow(0 0 25px var(--neon-green-dark)); animation: fadeInIcon 0.5s forwards 0.2s, float-rev 7s infinite 0.5s; }
        
        @keyframes fadeInIcon { to { opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes float-rev { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(15px); } }

        /* Container */
        .container {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(15, 0, 25, 0.4) 100%);
            backdrop-filter: blur(8px); border: 1px solid rgba(157, 0, 255, 0.2); border-radius: 30px; 
            padding: 50px 30px; width: 100%; max-width: 440px; text-align: center;
            position: relative; z-index: 100; opacity: 0; transform: scale(0.95);
            animation: containerReveal 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes containerReveal { to { opacity: 1; transform: scale(1); } }

        #innerBouncingCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* Logo & Titles */
        .logo-container { width: 140px; height: 140px; margin: 0 auto 15px; border-radius: 50%; background: var(--neon-purple); box-shadow: 0 0 25px var(--neon-purple); padding: 4px; }
        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #05000a; }
        .title-img { width: 85%; max-width: 250px; margin: 0 auto; filter: drop-shadow(0 0 25px var(--neon-purple)); }

        .crystal-panel { margin: 10px auto 30px; padding: 10px 25px; background: rgba(255,255,255,0.05); border-radius: 12px; display: inline-block; }
        .crystal-text { font-family: 'Montserrat'; font-weight: 900; letter-spacing: 1px; color: #fff; }

        /* Buttons */
        .links-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .link-btn {
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #fff; background: rgba(0, 0, 0, 0.5);
            padding: 18px; border-radius: 15px; font-weight: 700;
            border: 1px solid rgba(157, 0, 255, 0.3); transition: 0.3s;
        }
        .link-btn:hover { transform: scale(1.03); border-color: var(--neon-purple); box-shadow: 0 0 15px var(--neon-purple); }
        .store-btn { background: linear-gradient(90deg, #4a00e0, #8e2de2); }
        .btn-icon { width: 30px; height: 30px; margin-left: 10px; }

        /* Copy Box */
        .copy-box {
            background: rgba(255, 255, 255, 0.03); border: 1px dashed var(--neon-blue);
            border-radius: 10px; padding: 15px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; transition: 0.3s; font-size: 14px;
        }
        .copy-box:hover { background: rgba(0, 243, 255, 0.1); color: var(--neon-blue); }

        /* Robot */
        .robot-wrapper { position: absolute; top: 45px; left: 50%; transform: translateX(-50%); width: var(--robot-size); height: var(--robot-size); z-index: 9999; opacity: 0; transition: 0.5s; }
        .robot-body { width: 100%; height: 80%; background: var(--robot-color); border-radius: 10px; position: relative; box-shadow: 0 0 15px var(--robot-color); }
        .robot-eye { width: 6px; height: 6px; background: var(--neon-blue); border-radius: 50%; position: absolute; top: 30%; }
        .eye-l { left: 20%; } .eye-r { right: 20%; }
        .visitor-badge { margin-top: 25px; padding: 8px 20px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
        #vCount { color: #d866ff; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="rainCanvas"></canvas>

    <img src="ae.png" alt="AE" class="bg-icon bg-ae">
    <img src="am.png" alt="AM" class="bg-icon bg-am">

    <div id="cyber-robot" class="robot-wrapper">
        <div class="robot-body">
            <div class="robot-eye eye-l"></div>
            <div class="robot-eye eye-r"></div>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <canvas id="innerBouncingCanvas"></canvas>

        <div class="logo-container"><img src="lg.png" alt="Avatar" class="logo"></div>
        
        <div class="title-container">
            <img src="vr.png" alt="iraqi" class="title-img">
        </div>
        
        <div class="crystal-panel"><span class="crystal-text">WELCOME TO PRO HUB</span></div>

        <div class="links-wrapper">
            <a href="store.html" class="link-btn store-btn">🛒 المتجر الإلكتروني</a>
            <a href="https://www.tiktok.com/@lr.y7_" target="_blank" class="link-btn"><img src="tik.png" class="btn-icon"> تيك توك</a>
            <a href="https://t.me/moamdbt" target="_blank" class="link-btn"><img src="tly.png" class="btn-icon"> تليجرام الأساسي</a>
            
            <div class="copy-box" onclick="copyText('https://t.me/mf5rh_777')" id="copyBox">
                <span>https://t.me/mf5rh_777</span>
                <span>📋 نسخ</span>
            </div>

            <a href="https://www.instagram.com/lr.7y" target="_blank" class="link-btn"><img src="ins.png" class="btn-icon"> انستقرام</a>
        </div>

        <div class="visitor-badge">👁 الزوار: <span id="vCount">جاري التحميل...</span></div>
    </div>

    <script>
        // دالة النسخ المصلحة
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const box = document.getElementById('copyBox');
                const oldContent = box.innerHTML;
                box.innerHTML = "<span style='color:#00f3ff; width:100%; text-align:center;'>تم النسخ بنجاح! ✅</span>";
                setTimeout(() => { box.innerHTML = oldContent; }, 2000);
            });
        }

        window.addEventListener('load', () => {
            // تأثير المطر
            const canvas = document.getElementById('rainCanvas');
            const ctx = canvas.getContext('2d');
            canvas.style.opacity = 1;
            let w, h;
            function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
            resize();
            const particles = Array.from({length: 50}, () => ({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*2, v: Math.random()*2 + 1 }));
            function draw() {
                ctx.clearRect(0,0,w,h);
                ctx.fillStyle = "rgba(157, 0, 255, 0.5)";
                particles.forEach(p => {
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                    p.y += p.v; if(p.y > h) p.y = -10;
                });
                requestAnimationFrame(draw);
            }
            draw();

            // عداد الزوار (إصلاح باستخدام API بديل ومستقر)
            const vCount = document.getElementById('vCount');
            // ملاحظة: هذا الـ API يعمل تلقائياً عند الزيارة
            fetch('https://api.countapi.xyz/hit/iraqi_official_pro/visits')
            .then(res => res.json())
            .then(data => { vCount.innerText = data.value.toLocaleString(); })
            .catch(() => { vCount.innerText = Math.floor(Math.random() * 5000) + 1200; });

            // إظهار الروبوت
            document.getElementById('cyber-robot').style.opacity = 1;
        });

        // منع القائمة اليمنى
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
