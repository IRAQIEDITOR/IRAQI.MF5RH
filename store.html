<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عراقي | Pro Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --gold2: #c9a84c;
            --gold3: #8b6914;
            --gold4: #fff0a0;
            --red: #ff2a00;
            --bg: #060508;
            --robot-color: #c9a84c;
            --robot-red: #ff003c;
            --robot-size: 45px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px 80px;
            color: #fff;
            overflow-x: hidden;
            position: relative;
            font-family: 'Rajdhani', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none; z-index: 2;
            animation: scanMove 8s linear infinite;
        }
        @keyframes scanMove { from{background-position:0 0} to{background-position:0 100px} }

        .bg-glow {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 70% 40% at 50% 5%, rgba(201,168,76,0.22) 0%, transparent 55%),
                radial-gradient(ellipse 50% 30% at 10% 80%, rgba(139,105,20,0.12) 0%, transparent 50%),
                radial-gradient(ellipse 50% 30% at 90% 70%, rgba(180,120,0,0.1) 0%, transparent 50%);
        }

        .bg-grid {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background-image:
                linear-gradient(rgba(201,168,76,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridPulse 4s ease-in-out infinite;
        }
        @keyframes gridPulse { 0%,100%{opacity:.6} 50%{opacity:1} }

        .corner { position:fixed; width:60px; height:60px; z-index:3; pointer-events:none; }
        .corner::before,.corner::after { content:''; position:absolute; background:var(--gold2); }
        .corner::before { width:100%; height:2px; }
        .corner::after { width:2px; height:100%; }
        .c-tl { top:12px; left:12px; }
        .c-tl::before { top:0; left:0; }
        .c-tl::after { top:0; left:0; }
        .c-tr { top:12px; right:12px; transform:scaleX(-1); }
        .c-tr::before { top:0; left:0; }
        .c-tr::after { top:0; left:0; }
        .c-bl { bottom:12px; left:12px; transform:scaleY(-1); }
        .c-bl::before { top:0; left:0; }
        .c-bl::after { top:0; left:0; }
        .c-br { bottom:12px; right:12px; transform:scale(-1); }
        .c-br::before { top:0; left:0; }
        .c-br::after { top:0; left:0; }

        .corner { animation: cornerPulse 3s ease-in-out infinite; }
        @keyframes cornerPulse {
            0%,100%{ filter: drop-shadow(0 0 4px var(--gold2)); opacity:.7; }
            50%{ filter: drop-shadow(0 0 12px var(--gold)); opacity:1; }
        }

        .lightning {
            position:fixed; inset:0;
            background:rgba(255,215,0,0.06); opacity:0;
            pointer-events:none; z-index:9998; transition:opacity .08s;
        }

        #rainCanvas {
            position:fixed; top:0; left:0; width:100vw; height:100vh;
            z-index:1; pointer-events:none; opacity:0; transition:opacity 1s;
        }

        .robot-wrapper {
            position:absolute; top:45px; left:50%; margin-left:-22.5px;
            width:var(--robot-size); height:var(--robot-size);
            z-index:9999; touch-action:none; cursor:grab;
            opacity:0; transition:opacity .5s;
        }
        .robot-wrapper:active{cursor:grabbing}
        .robot-mesh{position:relative;width:100%;height:100%;animation:robotIdle 3s ease-in-out infinite}
        .robot-body{width:100%;height:80%;background:linear-gradient(135deg,#2b1a00,var(--robot-color));border-radius:12px 12px 8px 8px;position:relative;box-shadow:0 0 15px var(--robot-color);border:1px solid rgba(255,255,255,.3)}
        .eyes-container{display:flex;justify-content:space-between;width:22px;position:absolute;top:30%;left:50%;transform:translateX(-50%)}
        .robot-eye{width:6px;height:6px;background:var(--gold);border-radius:50%;box-shadow:0 0 8px var(--gold);animation:blink 4s infinite}
        .robot-mouth{width:14px;height:6px;position:absolute;bottom:25%;left:50%;transform:translateX(-50%);border-bottom:2px solid var(--gold);border-radius:0 0 10px 10px}
        .robot-propeller{width:60%;height:4px;background:rgba(255,215,0,.85);position:absolute;top:-6px;left:50%;transform:translateX(-50%);border-radius:2px;animation:spinBlade .1s linear infinite}
        .light-beam{position:absolute;top:50%;left:22px;height:35px;background:linear-gradient(to right,rgba(255,215,0,.8),transparent);transform-origin:left center;opacity:0;pointer-events:none;transition:opacity .3s;clip-path:polygon(0 40%,100% 0,100% 100%,0 60%);z-index:-1}
        @keyframes robotIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes spinBlade{to{transform:translateX(-50%) rotateY(360deg)}}
        @keyframes blink{0%,96%,98%{transform:scaleY(1)}97%{transform:scaleY(.1)}}
        .robot-spin{animation:quickSpin .5s ease-out !important}
        @keyframes quickSpin{0%{transform:rotate(0deg) scale(1.2)}100%{transform:rotate(360deg) scale(1)}}
        .robot-shake{animation:shakeDust .6s ease-in-out !important}
        @keyframes shakeDust{0%,100%{transform:translateX(0) rotate(0)}20%,60%{transform:translateX(-5px) rotate(-10deg)}40%,80%{transform:translateX(5px) rotate(10deg)}}
        .robot-red-theme .robot-body{background:linear-gradient(135deg,#4a0000,var(--robot-red));box-shadow:0 0 20px var(--robot-red)}
        .btn-blue-reaction{background:rgba(0,243,255,.15) !important;box-shadow:0 0 20px #00f3ff,0 0 40px #00f3ff !important;border-color:#00f3ff !important;transform:scale(1.05) !important;color:#00f3ff !important}

        .bg-icon{position:fixed;z-index:150;width:110px;pointer-events:none;opacity:0;}
        .bg-ae{top:18px;right:18px;filter:drop-shadow(0 0 16px var(--gold2));animation:fadeInIcon .6s ease forwards .3s,float 6s ease-in-out infinite .5s}
        .bg-am{bottom:80px;left:18px;filter:drop-shadow(0 0 14px var(--gold3));animation:fadeInIcon .6s ease forwards .3s,floatRev 7s ease-in-out infinite .5s}
        @keyframes fadeInIcon{to{opacity:1}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
        @keyframes floatRev{0%,100%{transform:translateY(0)}50%{transform:translateY(14px)}}

        .wrapper {
            width: 100%; max-width: 430px;
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center; gap: 0;
        }

        .logo-section {
            position: relative; width: 100%; text-align: center;
            padding-bottom: 10px;
            opacity: 0; animation: dropIn .5s cubic-bezier(.2,.8,.2,1) forwards .1s;
        }
        @keyframes dropIn{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:none}}

        .hex-frame {
            position: relative;
            width: 140px; height: 140px;
            margin: 0 auto 18px;
        }
        .hex-frame::before {
            content: '';
            position: absolute; inset: -4px;
            background: conic-gradient(var(--gold3),var(--gold),var(--gold4),var(--gold),var(--gold3));
            clip-path: polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
            animation: hexRotateBG 6s linear infinite;
            z-index: 0;
        }
        @keyframes hexRotateBG{from{filter:hue-rotate(0deg) brightness(1)} 50%{filter:hue-rotate(15deg) brightness(1.3)} to{filter:hue-rotate(0deg) brightness(1)}}
        .hex-frame::after {
            content: '';
            position: absolute; inset: -8px;
            border: 2px solid rgba(255,215,0,0.2);
            clip-path: polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
            animation: hexPulse 2s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes hexPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.8;transform:scale(1.05)}}
        .hex-inner {
            position: relative; z-index:1;
            width: 100%; height: 100%;
            clip-path: polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
            overflow: hidden;
            background: #0a0800;
        }
        .logo { width:100%; height:100%; object-fit:cover; display:block; }

        .hex-scan {
            position: absolute; inset: 0;
            z-index: 2; pointer-events: none;
            clip-path: polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
            background: linear-gradient(180deg, transparent 0%, rgba(255,215,0,0.15) 50%, transparent 100%);
            animation: hexScan 2.5s ease-in-out infinite;
        }
        @keyframes hexScan{0%{background-position:0 -150%;} 100%{background-position:0 250%;}}

        .title-img {
            width: 88%; max-width: 260px; display: block; margin: 0 auto;
            filter: drop-shadow(0 0 16px rgba(255,215,0,.8)) drop-shadow(0 0 40px rgba(201,168,76,.5));
            animation: glitch 4s infinite, titleFloat 3s ease-in-out infinite;
            opacity: 0; animation-fill-mode: both;
            animation-delay: 0.2s, 0s;
        }
        @keyframes glitch{0%,88%,100%{transform:translate(0) skewX(0)}90%{transform:translate(3px,-2px) skewX(-2deg)}92%{transform:translate(-3px,2px) skewX(2deg)}94%{transform:translate(0) skewX(0)}}
        @keyframes titleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

        .status-bar {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin: 10px 0 6px;
            opacity: 0; animation: fadeUp .4s ease forwards .35s;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
            animation: dotPulse 1.2s ease-in-out infinite;
        }
        @keyframes dotPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.7}}
        .status-text {
            font-family: 'Orbitron', monospace; font-size: 10px;
            letter-spacing: 3px; color: rgba(255,215,0,0.6); text-transform: uppercase;
        }

        .divider {
            width: 100%; height: 1px; position: relative; margin: 18px 0;
            opacity: 0; animation: fadeIn .5s ease forwards .3s;
        }
        @keyframes fadeIn{to{opacity:1}}
        .divider::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, var(--gold2) 20%, var(--gold) 50%, var(--gold2) 80%, transparent);
        }
        .divider-gem {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 10px; height: 10px;
            background: var(--gold); clip-path: polygon(50% 0%,100% 50%,50% 100%,0% 50%);
            box-shadow: 0 0 15px var(--gold), 0 0 30px rgba(255,215,0,.4);
            animation: gemSpin 4s linear infinite;
        }
        @keyframes gemSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}

        .links-wrapper {
            width: 100%; display: flex; flex-direction: column; gap: 12px;
        }

        .link-btn {
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: rgba(255,215,0,0.9);
            padding: 16px 22px; font-size: 17px; font-weight: 700;
            font-family: 'Rajdhani', sans-serif; letter-spacing: 1.5px;
            position: relative; overflow: hidden;
            border: none; cursor: pointer; background: none;
            opacity: 0; animation: slideIn .4s ease forwards;
        }

        .link-btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(201,168,76,0.08) 0%, rgba(255,215,0,0.04) 100%);
            clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
            border: 1px solid rgba(201,168,76,0.25);
            transition: all .2s ease;
        }
        .link-btn::after {
            content: '';
            position: absolute; top: 0; left: 0;
            width: 18px; height: 2px;
            background: var(--gold);
            clip-path: none;
            transition: width .3s ease;
            box-shadow: 0 0 8px var(--gold);
        }

        .link-btn:hover::before {
            background: linear-gradient(135deg, rgba(201,168,76,0.2) 0%, rgba(255,215,0,0.08) 100%);
            border-color: rgba(255,215,0,.6);
            box-shadow: 0 0 20px rgba(201,168,76,.3), inset 0 0 20px rgba(255,215,0,.04);
        }
        .link-btn:hover::after { width: 100%; }
        .link-btn:hover { transform: translateX(4px); color: var(--gold); }
        .link-btn:hover .link-arrow { opacity: 1; transform: translateX(0); }

        .link-btn:nth-child(1){animation-delay:.4s}
        .link-btn:nth-child(2){animation-delay:.48s}
        .link-btn:nth-child(3){animation-delay:.56s}
        .link-btn:nth-child(5){animation-delay:.72s}
        @keyframes slideIn{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:none}}

        .store-btn {
            color: var(--bg);
            font-family: 'Orbitron', monospace; font-size: 14px; letter-spacing: 2px;
        }
        .store-btn::before {
            background: linear-gradient(90deg, var(--gold3), var(--gold), var(--gold4));
            border: none;
            box-shadow: 0 0 25px rgba(201,168,76,.4);
        }
        .store-btn:hover { color: var(--bg) !important; transform: translateX(4px) scale(1.01); }
        .store-btn:hover::before {
            background: linear-gradient(90deg, var(--gold2), var(--gold4), var(--gold));
            box-shadow: 0 0 40px rgba(255,215,0,.6);
        }

        .btn-icon{width:40px;height:40px;margin-right:12px;object-fit:contain;pointer-events:none;position:relative;z-index:1}
        .btn-icon-telegram{transform:scale(1.3)}
        .btn-icon-instagram{transform:scale(1.1)}
        .glow-tiktok{filter:drop-shadow(0 0 7px rgba(220,220,220,.9))}
        .glow-telegram{filter:drop-shadow(0 0 7px #00f3ff)}
        .glow-instagram{filter:drop-shadow(0 0 7px #ff007f)}
        .btn-text{position:relative;z-index:1}

        .link-arrow {
            position: absolute; right: 18px; z-index: 1;
            font-size: 18px; color: var(--gold);
            opacity: 0; transform: translateX(-8px);
            transition: all .2s ease;
        }

        .copy-box {
            position: relative; overflow: hidden;
            width: 100%;
            background: rgba(0,0,0,0.3);
            clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
            border: 1px dashed rgba(201,168,76,.3);
            padding: 13px 18px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; font-weight: 700; color: rgba(201,168,76,.5);
            cursor: pointer; transition: all .25s ease;
            letter-spacing: .5px;
            opacity: 0; animation: slideIn .4s ease forwards .64s;
        }
        .copy-box:hover{background:rgba(201,168,76,.08);color:var(--gold);border-color:rgba(201,168,76,.5)}
        .copy-icon{font-size:16px;position:relative;z-index:1}
        .copy-link{flex:1;text-align:center;margin:0 10px;position:relative;z-index:1}

        .visitor-wrap {
            margin-top: 24px; width: 100%;
            display: flex; justify-content: center;
            opacity: 0; animation: fadeUp .4s ease forwards .85s;
        }
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
        .visitor-badge {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 10px 28px;
            font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 2px;
            color: rgba(255,215,0,.6);
            background: rgba(255,215,0,.03);
            clip-path: polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
            border: 1px solid rgba(201,168,76,.15);
        }
        .visitor-badge strong{color:var(--gold);font-size:13px;text-shadow:0 0 10px rgba(255,215,0,.6)}

        #particleCanvas {
            position:fixed;top:0;left:0;width:100vw;height:100vh;
            z-index:1;pointer-events:none;opacity:0;transition:opacity 1s;
        }

        @media(min-width:768px){
            .bg-ae{right:calc(50% - 310px) !important}
            .bg-am{left:calc(50% - 310px) !important}
            .c-tl,.c-tr{top:20px}
            .c-bl,.c-br{bottom:20px}
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="bg-grid"></div>
    <canvas id="particleCanvas"></canvas>
    <div class="lightning" id="flash"></div>

    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>

    <img src="ae.png" alt="AE" class="bg-icon bg-ae">
    <img src="am.png" alt="AM" class="bg-icon bg-am">

    <div id="cyber-robot" class="robot-wrapper">
        <div class="robot-mesh">
            <div class="robot-body">
                <div class="eyes-container"><div class="robot-eye"></div><div class="robot-eye"></div></div>
                <div class="robot-mouth"></div>
            </div>
            <div class="robot-propeller"></div>
            <div id="robot-laser" class="light-beam"></div>
        </div>
    </div>

    <div class="wrapper" id="mainContainer">

        <div class="logo-section">
            <div class="hex-frame">
                <div class="hex-inner">
                    <img src="lg.png" alt="Avatar" class="logo">
                </div>
                <div class="hex-scan"></div>
            </div>
            <img src="vr.png" alt="iraqi" class="title-img">
            <div class="status-bar">
                <div class="status-dot"></div>
                <span class="status-text">ONLINE • PRO HUB</span>
                <div class="status-dot"></div>
            </div>
        </div>

        <div class="divider" style="opacity:0;animation:fadeIn .5s ease forwards .32s">
            <div class="divider-gem"></div>
        </div>

        <div class="links-wrapper">
            <a href="store.html" class="link-btn store-btn">
                <span class="btn-text">⚡ ONLINE STORE</span>
            </a>

            <a href="https://www.tiktok.com/@lr.y7_?is_from_webapp=1&sender_device=pc" target="_blank" class="link-btn">
                <img src="tik.png" alt="TikTok" class="btn-icon glow-tiktok">
                <span class="btn-text">TIKTOK</span>
                <span class="link-arrow">›</span>
            </a>

            <a href="https://t.me/moamdbt" target="_blank" class="link-btn" id="telegram-btn">
                <img src="tly.png" alt="Telegram" class="btn-icon btn-icon-telegram glow-telegram">
                <span class="btn-text">TELEGRAM</span>
                <span class="link-arrow">›</span>
            </a>

            <div class="copy-box" onclick="copyTelegramLink()" id="copyBox">
                <span class="copy-link">https://t.me/mf5rh_777</span>
                <span class="copy-icon">📋</span>
            </div>

            <a href="https://www.instagram.com/lr.7y?igsh=cW1zOGY4aDk4MG56" target="_blank" class="link-btn">
                <img src="ins.png" alt="Instagram" class="btn-icon btn-icon-instagram glow-instagram">
                <span class="btn-text">INSTAGRAM</span>
                <span class="link-arrow">›</span>
            </a>
        </div>

        <div class="visitor-wrap">
            <div class="visitor-badge">
                <span>👁 VISITORS</span>
                <strong id="vCount">...</strong>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());

        /* ══════════════════════════════════════
           VISITOR COUNTER — مُصلح
        ══════════════════════════════════════ */
        (function initCounter() {
            const vEl = document.getElementById('vCount');
            const STORAGE_KEY = 'IRAQI_visitor_count';

            // اقرأ الرقم المحفوظ فوراً بدون انتظار
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) vEl.innerText = parseInt(saved).toLocaleString();

            // زد العداد وجيب القيمة الجديدة
            fetch('https://counterapi.com/api/iraqi-pro-hub/view/visits')
                .then(r => {
                    if (!r.ok) throw new Error('network');
                    return r.json();
                })
                .then(d => {
                    const count = d && (d.value || d.count);
                    if (count) {
                        const n = parseInt(count).toLocaleString();
                        vEl.innerText = n;
                        localStorage.setItem(STORAGE_KEY, parseInt(count));
                    }
                })
                .catch(() => {
                    // لو API فشل: زد الرقم المحفوظ +1 وخزّنه
                    const current = parseInt(localStorage.getItem(STORAGE_KEY) || '0');
                    const next = current + 1;
                    localStorage.setItem(STORAGE_KEY, next);
                    vEl.innerText = next.toLocaleString();
                });
        })();

        window.addEventListener('load', () => {
            setTimeout(() => {

                /* ── Gold particle field ── */
                const pc = document.getElementById('particleCanvas');
                pc.style.opacity = "1";
                const ctx = pc.getContext('2d');
                const resize = () => { pc.width = innerWidth; pc.height = innerHeight; };
                resize();

                const pts = Array.from({length: 70}, () => ({
                    x: Math.random() * innerWidth,
                    y: Math.random() * innerHeight,
                    r: Math.random() * 1.8 + 0.3,
                    sp: Math.random() * 0.3 + 0.05,
                    o: Math.random() * 0.5 + 0.05,
                    drift: (Math.random() - 0.5) * 0.3
                }));

                const streaks = Array.from({length: 8}, () => ({
                    x: Math.random() * innerWidth,
                    y: Math.random() * innerHeight,
                    len: Math.random() * 80 + 30,
                    sp: Math.random() * 3 + 1.5,
                    o: Math.random() * 0.15 + 0.03,
                    w: Math.random() * 1 + 0.3
                }));

                (function animP() {
                    ctx.clearRect(0, 0, pc.width, pc.height);

                    streaks.forEach(s => {
                        const g = ctx.createLinearGradient(s.x, s.y - s.len, s.x + s.drift * 5, s.y);
                        g.addColorStop(0, `rgba(255,215,0,0)`);
                        g.addColorStop(1, `rgba(255,215,0,${s.o})`);
                        ctx.beginPath(); ctx.strokeStyle = g; ctx.lineWidth = s.w;
                        ctx.moveTo(s.x, s.y - s.len); ctx.lineTo(s.x + s.drift * 5, s.y);
                        ctx.stroke();
                        s.y += s.sp; s.x += s.drift * 0.1;
                        if (s.y > pc.height + s.len) { s.y = -s.len; s.x = Math.random() * pc.width; }
                    });

                    pts.forEach(p => {
                        ctx.fillStyle = `hsla(${44 + Math.random() * 12}, 85%, 62%, ${p.o})`;
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
                        p.y += p.sp; p.x += p.drift;
                        if (p.y > pc.height) { p.y = 0; p.x = Math.random() * pc.width; }
                        if (p.x < 0) p.x = pc.width;
                        if (p.x > pc.width) p.x = 0;
                    });

                    requestAnimationFrame(animP);
                })();

                window.addEventListener('resize', resize);

                /* ── Random lightning ── */
                const flash = document.getElementById('flash');
                setInterval(() => {
                    if (Math.random() > 0.7) {
                        flash.style.opacity = '1';
                        setTimeout(() => flash.style.opacity = '0', 80);
                        setTimeout(() => {
                            if (Math.random() > 0.5) {
                                flash.style.opacity = '0.6';
                                setTimeout(() => flash.style.opacity = '0', 50);
                            }
                        }, 120);
                    }
                }, 5000);

                /* ── Robot ── */
                const robot = document.getElementById('cyber-robot');
                robot.style.opacity = '1';
                const robotMesh = document.querySelector('.robot-mesh');
                const laser = document.getElementById('robot-laser');
                const tgBtn = document.getElementById('telegram-btn');
                let dragging = false, xOff = 0, yOff = 0;

                setTimeout(() => {
                    if (!tgBtn) return;
                    const tR = tgBtn.getBoundingClientRect(), rR = robot.getBoundingClientRect();
                    const mX = tR.left - rR.left - 80, mY = tR.top - rR.top + 10;
                    robot.style.transition = 'transform 1.5s ease-in-out';
                    robot.style.transform = `translate(${mX}px,${mY}px)`;
                    xOff = mX; yOff = mY;
                    setTimeout(() => {
                        const cR = robot.getBoundingClientRect();
                        const dx = tR.left - (cR.left + 45), dy = (tR.top + tR.height / 2) - (cR.top + 22);
                        const dist = Math.hypot(dx, dy), ang = Math.atan2(dy, dx) * 180 / Math.PI;
                        laser.style.width = `${dist}px`; laser.style.transform = `rotate(${ang}deg)`;
                        laser.style.opacity = '1'; tgBtn.classList.add('btn-blue-reaction');
                        setTimeout(() => { laser.style.opacity = '0'; tgBtn.classList.remove('btn-blue-reaction'); robot.style.transform = 'translate(0,0)'; xOff = 0; yOff = 0; }, 2000);
                    }, 1500);
                }, 1000);

                let initX, initY;
                robot.addEventListener('touchstart', e => {
                    if (dragging) return; e.stopPropagation();
                    robotMesh.classList.remove('robot-shake'); robotMesh.classList.add('robot-spin', 'robot-red-theme');
                    setTimeout(() => robotMesh.classList.remove('robot-spin', 'robot-red-theme'), 500);
                    initX = e.touches[0].pageX - xOff; initY = e.touches[0].pageY - yOff;
                    robot.style.transition = 'none';
                });
                robot.addEventListener('touchmove', e => {
                    dragging = true; e.preventDefault();
                    const cx = e.touches[0].pageX - initX, cy = e.touches[0].pageY - initY;
                    xOff = cx; yOff = cy; robot.style.transform = `translate(${cx}px,${cy}px)`;
                }, { passive: false });
                robot.addEventListener('touchend', () => {
                    if (dragging) { robotMesh.classList.add('robot-shake'); setTimeout(() => robotMesh.classList.remove('robot-shake'), 600); dragging = false; }
                });

            }, 300);
        });

        /* Parallax */
        document.addEventListener('mousemove', e => {
            const x = (innerWidth / 2 - e.clientX) / 90, y = (innerHeight / 2 - e.clientY) / 90;
            document.body.style.transform = `translate(${x}px,${y}px)`;
        });

        /* Click flash */
        document.addEventListener('click', e => {
            if (e.target.closest('#cyber-robot') || e.target.closest('.link-btn')) return;
            const f = document.getElementById('flash');
            f.style.opacity = '1'; setTimeout(() => f.style.opacity = '0', 90);
        });

        /* Copy */
        function copyTelegramLink() {
            navigator.clipboard.writeText('https://t.me/mf5rh_777').then(() => {
                const box = document.getElementById('copyBox'), orig = box.innerHTML;
                box.innerHTML = '<span style="color:var(--gold);font-weight:bold;width:100%;text-align:center;font-family:Orbitron,sans-serif;letter-spacing:2px;font-size:13px;">COPIED ✔</span>';
                setTimeout(() => box.innerHTML = orig, 2000);
            }).catch(() => {});
        }
    </script>
</body>
</html>
