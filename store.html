<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عراقي | Pro Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --p:#9d00ff;
  --b:#00f3ff;
  --g:#ffcc44;
  --r:#ff003c;
  --bg:#05000a;
  --card:rgba(8,0,18,0.82);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:80px 18px 60px;
  font-family:'Tajawal',sans-serif;
  color:#fff;
  overflow-x:hidden;
  position:relative;
  user-select:none;
  cursor:none;
}

/* CURSOR */
#c-dot{position:fixed;width:10px;height:10px;background:var(--b);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);box-shadow:0 0 14px var(--b),0 0 30px var(--b);transition:width .12s,height .12s,background .12s;}
#c-ring{position:fixed;width:34px;height:34px;border:1.5px solid rgba(157,0,255,.6);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);}

/* BG */
#rainCanvas{position:fixed;inset:0;width:100vw;height:100vh;z-index:1;pointer-events:none;opacity:0;transition:opacity 1.2s ease;}
.grid-floor{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(157,0,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(157,0,255,.06) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(ellipse at 50% 60%,black 20%,transparent 75%);}
.glow-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(90px);opacity:.22;animation:orbDrift 14s ease-in-out infinite;}
.go1{width:550px;height:550px;background:var(--p);top:-160px;left:-120px;}
.go2{width:420px;height:420px;background:#0040ff;bottom:-100px;right:-80px;animation-delay:-6s;}
.go3{width:320px;height:320px;background:var(--b);top:35%;left:55%;transform:translate(-50%,-50%);opacity:.1;animation-delay:-10s;}
@keyframes orbDrift{0%,100%{transform:translate(0,0)}33%{transform:translate(25px,-35px)}66%{transform:translate(-20px,22px)}}
.scanlines{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.18) 3px,rgba(0,0,0,.18) 4px);}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.88) 100%);}
.lightning{position:fixed;inset:0;z-index:9998;background:rgba(200,0,255,.18);opacity:0;pointer-events:none;transition:opacity .08s;}

/* CORNER ICONS */
.bg-icon{position:fixed;z-index:150;width:115px;pointer-events:none;opacity:0;}
.bg-ae{top:22px;right:18px;filter:drop-shadow(0 0 22px var(--p)) drop-shadow(0 0 50px var(--p));animation:iconFadeIn .6s ease forwards .3s,floatUp 6s ease-in-out infinite .8s;}
.bg-am{bottom:80px;left:18px;filter:drop-shadow(0 0 22px #004d00) drop-shadow(0 0 40px #00ff44);animation:iconFadeIn .6s ease forwards .5s,floatDown 7s ease-in-out infinite .8s;}
@keyframes iconFadeIn{to{opacity:1}}
@keyframes floatUp{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-16px) rotate(3deg)}}
@keyframes floatDown{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(16px) rotate(-3deg)}}

/* ROBOT */
.robot-wrapper{position:fixed;top:42px;left:50%;margin-left:-22px;width:45px;height:45px;z-index:9999;cursor:none;opacity:0;transition:opacity .5s;touch-action:none;}
.robot-mesh{position:relative;width:100%;height:100%;animation:rIdle 3s ease-in-out infinite;}
.robot-body{width:100%;height:80%;background:linear-gradient(135deg,#2b004a,var(--p));border-radius:12px 12px 8px 8px;border:1px solid rgba(255,255,255,.25);box-shadow:0 0 18px var(--p),inset 0 0 8px rgba(0,243,255,.15);position:relative;}
.eyes-c{display:flex;justify-content:space-between;width:22px;position:absolute;top:30%;left:50%;transform:translateX(-50%);}
.r-eye{width:6px;height:6px;background:var(--b);border-radius:50%;box-shadow:0 0 10px var(--b);animation:eyeBlink 4s infinite;}
.r-mouth{width:14px;height:6px;position:absolute;bottom:24%;left:50%;transform:translateX(-50%);border-bottom:2px solid var(--b);border-radius:0 0 10px 10px;}
.r-prop{width:60%;height:4px;background:rgba(255,255,255,.85);position:absolute;top:-6px;left:50%;transform:translateX(-50%);border-radius:2px;animation:spinBlade .1s linear infinite;}
@keyframes rIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes spinBlade{to{transform:translateX(-50%) rotateY(360deg)}}
@keyframes eyeBlink{0%,95%,100%{transform:scaleY(1)}97%{transform:scaleY(.08)}}

/* MAIN CARD */
.container{
  background:var(--card);
  backdrop-filter:blur(22px) saturate(180%);
  -webkit-backdrop-filter:blur(22px) saturate(180%);
  border-radius:36px;
  border:1px solid rgba(157,0,255,.22);
  padding:48px 28px 52px;
  width:100%;max-width:440px;
  position:relative;z-index:100;
  text-align:center;overflow:hidden;
  box-shadow:0 0 0 1px rgba(0,243,255,.06),0 0 55px rgba(157,0,255,.18),0 30px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05),inset 0 0 60px rgba(157,0,255,.04);
  opacity:0;transform:translateY(40px) scale(.96);
  animation:cardReveal .65s cubic-bezier(.22,1.1,.5,1) .1s forwards;
}
@keyframes cardReveal{to{opacity:1;transform:translateY(0) scale(1)}}
.container::before{content:'';position:absolute;top:0;left:15%;width:70%;height:1.5px;background:linear-gradient(90deg,transparent,var(--p),var(--b),var(--p),transparent);border-radius:0 0 4px 4px;box-shadow:0 0 18px var(--p);animation:barShimmer 3s ease-in-out infinite;}
@keyframes barShimmer{0%,100%{opacity:.6}50%{opacity:1}}

#innerBouncingCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0;transition:opacity 1s;}

/* STAGGERED REVEALS */
.reveal{position:relative;z-index:10;opacity:0;animation:fadeUpBlur .5s cubic-bezier(.22,1,.5,1) forwards;}
@keyframes fadeUpBlur{from{opacity:0;transform:translateY(22px);filter:blur(6px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
.r1{animation-delay:.15s}.r2{animation-delay:.25s}.r3{animation-delay:.35s}

/* LOGO */
.logo-wrap{width:136px;height:136px;margin:0 auto 20px;position:relative;}
.logo-ring{position:absolute;inset:-5px;border-radius:50%;background:conic-gradient(var(--p),var(--b),var(--g),var(--r),var(--p));animation:spinRing 4s linear infinite;filter:blur(.5px);}
@keyframes spinRing{to{transform:rotate(360deg)}}
.logo-ring-inner{position:absolute;inset:3px;border-radius:50%;background:var(--bg);}
.logo-img-wrap{position:absolute;inset:8px;border-radius:50%;overflow:hidden;box-shadow:inset 0 0 20px rgba(0,0,0,.9);}
.logo-img-wrap img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;}
.live-dot{position:absolute;bottom:5px;right:5px;z-index:5;width:20px;height:20px;border-radius:50%;background:#00ff88;border:3px solid var(--bg);box-shadow:0 0 14px #00ff88;animation:livePulse 1.4s ease-in-out infinite;}
@keyframes livePulse{0%,100%{box-shadow:0 0 8px #00ff88}50%{box-shadow:0 0 24px #00ff88,0 0 48px #00ff88}}

/* TITLE */
.title-wrap{margin:0 auto 8px;}
.title-img{width:85%;max-width:260px;display:block;margin:0 auto;filter:drop-shadow(0 0 18px rgba(157,0,255,.9)) drop-shadow(0 0 40px rgba(0,243,255,.4));animation:glitchTitle 5s infinite;}
@keyframes glitchTitle{0%,90%,100%{transform:none;filter:drop-shadow(0 0 18px rgba(157,0,255,.9)) drop-shadow(0 0 40px rgba(0,243,255,.4))}92%{transform:translate(2px,-2px) skew(-1deg);filter:drop-shadow(-3px 0 var(--r)) drop-shadow(3px 0 var(--b))}94%{transform:translate(-2px,2px) skew(1deg)}96%{transform:none;filter:drop-shadow(0 0 30px var(--p))}}

/* CRYSTAL PANEL */
.crystal-panel{margin:10px auto 28px;padding:11px 26px;background:rgba(255,255,255,.025);backdrop-filter:blur(16px);border-radius:12px;border:1px solid rgba(255,255,255,.08);display:inline-block;box-shadow:0 4px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);position:relative;overflow:hidden;}
.crystal-panel::before{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.06) 50%,transparent 60%);transform:translateX(-100%);animation:crystalSweep 3.5s ease infinite;}
@keyframes crystalSweep{to{transform:translateX(200%)}}
.crystal-text{font-family:'Montserrat',sans-serif;font-weight:900;font-size:13px;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(180deg,#ffffff 0%,#9aa0a6 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 4px rgba(0,0,0,.8));position:relative;z-index:2;}

/* LINKS */
.links-wrapper{display:flex;flex-direction:column;gap:13px;position:relative;z-index:10;}

.link-btn{
  display:flex;align-items:center;justify-content:flex-start;
  text-decoration:none;color:#fff;
  padding:16px 20px;border-radius:18px;
  font-size:16px;font-weight:700;font-family:'Tajawal',sans-serif;
  border:1px solid rgba(157,0,255,.25);
  background:rgba(0,0,0,.55);
  position:relative;overflow:hidden;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s;
  cursor:none;gap:13px;
  opacity:0;animation:fadeUpBlur .5s cubic-bezier(.22,1,.5,1) forwards;
}
.link-btn:nth-of-type(1){animation-delay:.42s}
.link-btn:nth-of-type(2){animation-delay:.52s}
.link-btn:nth-of-type(3){animation-delay:.62s}
.link-btn:nth-of-type(4){animation-delay:.72s}
.link-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.1) 50%,transparent 60%);transform:translateX(-100%);transition:transform .5s ease;}
.link-btn:hover::before{transform:translateX(150%);}
.link-btn:hover{transform:scale(1.045) translateY(-2px);box-shadow:0 0 20px rgba(157,0,255,.5),0 0 40px rgba(0,243,255,.15),0 8px 30px rgba(0,0,0,.5);border-color:var(--p);}
.link-btn:active{transform:scale(.97);}

.store-btn{background:linear-gradient(130deg,#3a0070,#6a00c0,#9d00ff);border-color:rgba(255,204,68,.35);box-shadow:0 4px 24px rgba(157,0,255,.35),inset 0 1px 0 rgba(255,255,255,.12);}
.store-btn:hover{box-shadow:0 6px 40px rgba(157,0,255,.6),0 0 20px var(--g);}

.btn-icon{width:40px;height:40px;object-fit:contain;pointer-events:none;flex-shrink:0;}
.btn-icon-tg{transform:scale(1.25);}
.btn-icon-ig{transform:scale(1.1);}
.glow-tiktok{filter:drop-shadow(0 0 8px rgba(220,220,220,.9));}
.glow-telegram{filter:drop-shadow(0 0 10px var(--b));}
.glow-instagram{filter:drop-shadow(0 0 10px #ff007f);}

.btn-texts{display:flex;flex-direction:column;align-items:flex-start;flex:1;}
.btn-main{font-size:16px;font-weight:800;line-height:1;}
.btn-sub{font-size:11px;opacity:.45;margin-top:3px;letter-spacing:.5px;}
.btn-arr{font-size:15px;opacity:.3;transition:opacity .2s,transform .2s;margin-right:2px;}
.link-btn:hover .btn-arr{opacity:.8;transform:translateX(-4px);}

/* COPY BOX */
.copy-box{display:flex;align-items:center;background:rgba(255,255,255,.025);border:1px dashed rgba(0,243,255,.3);border-radius:14px;padding:14px 18px;gap:10px;cursor:none;transition:all .22s ease;position:relative;overflow:hidden;z-index:10;opacity:0;animation:fadeUpBlur .5s cubic-bezier(.22,1,.5,1) .67s forwards;}
.copy-box:hover{background:rgba(0,243,255,.08);border-color:var(--b);box-shadow:0 0 20px rgba(0,243,255,.2);transform:scale(1.025);}
.copy-url{flex:1;font-size:13px;font-weight:700;color:rgba(255,255,255,.6);direction:ltr;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.copy-badge{background:rgba(0,243,255,.12);border:1px solid rgba(0,243,255,.35);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:900;color:var(--b);white-space:nowrap;flex-shrink:0;transition:background .2s;}
.copy-box:hover .copy-badge{background:rgba(0,243,255,.22);}
.copy-ok{position:absolute;inset:0;border-radius:14px;background:rgba(0,255,100,.1);display:flex;align-items:center;justify-content:center;color:#00ff88;font-weight:900;font-size:15px;letter-spacing:2px;opacity:0;pointer-events:none;transition:opacity .2s;}
.copy-ok.show{opacity:1;}

/* VISITOR */
.visitor-wrap{display:flex;justify-content:center;margin-top:32px;position:relative;z-index:10;opacity:0;animation:fadeUpBlur .5s cubic-bezier(.22,1,.5,1) .85s forwards;}
.visitor-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 26px;background:rgba(255,255,255,.03);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.12);border-radius:60px;font-size:14px;letter-spacing:1px;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.v-label{color:rgba(255,255,255,.5);font-weight:700;}
.v-count{color:#d866ff;font-weight:900;font-size:16px;text-shadow:0 0 10px rgba(216,102,255,.7);font-family:'Montserrat',sans-serif;min-width:48px;text-align:center;}

/* RESPONSIVE */
@media(max-width:480px){
  .container{padding:36px 18px 42px;border-radius:28px;}
  .link-btn{font-size:15px;padding:14px 16px;}
  .bg-icon{width:88px;}
}
@media(min-width:768px){
  .bg-ae{right:calc(50% - 320px) !important;}
  .bg-am{left:calc(50% - 320px) !important;}
}
</style>
</head>
<body>

<div id="c-dot"></div>
<div id="c-ring"></div>

<canvas id="rainCanvas"></canvas>
<div class="grid-floor"></div>
<div class="glow-orb go1"></div>
<div class="glow-orb go2"></div>
<div class="glow-orb go3"></div>
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="lightning" id="flash"></div>

<!-- corner icons — original paths -->
<img src="ae.png" alt="AE" class="bg-icon bg-ae">
<img src="am.png" alt="AM" class="bg-icon bg-am">

<!-- robot -->
<div id="cyber-robot" class="robot-wrapper">
  <div class="robot-mesh">
    <div class="robot-body">
      <div class="eyes-c"><div class="r-eye"></div><div class="r-eye"></div></div>
      <div class="r-mouth"></div>
    </div>
    <div class="r-prop"></div>
  </div>
</div>

<div class="container" id="mainContainer">
  <canvas id="innerBouncingCanvas"></canvas>

  <!-- avatar: lg.png -->
  <div class="logo-wrap reveal r1">
    <div class="logo-ring"></div>
    <div class="logo-ring-inner"></div>
    <div class="logo-img-wrap"><img src="lg.png" alt="Avatar"></div>
    <div class="live-dot"></div>
  </div>

  <!-- title: vr.png -->
  <div class="title-wrap reveal r2">
    <img src="vr.png" alt="عراقي" class="title-img">
  </div>

  <div class="crystal-panel reveal r3">
    <span class="crystal-text">اهلاً بالجميع</span>
  </div>

  <div class="links-wrapper">

    <a href="store.html" class="link-btn store-btn">
      <span style="font-size:22px;flex-shrink:0">🛒</span>
      <div class="btn-texts">
        <span class="btn-main">Online Store</span>
        <span class="btn-sub">المتجر الرسمي</span>
      </div>
      <span class="btn-arr">◄</span>
    </a>

    <!-- tik.png -->
    <a href="https://www.tiktok.com/@lr.y7_?is_from_webapp=1&sender_device=pc" target="_blank" class="link-btn">
      <img src="tik.png" alt="TikTok" class="btn-icon glow-tiktok">
      <div class="btn-texts">
        <span class="btn-main">TikTok</span>
        <span class="btn-sub">@lr.y7_</span>
      </div>
      <span class="btn-arr">◄</span>
    </a>

    <!-- tly.png -->
    <a href="https://t.me/moamdbt" target="_blank" class="link-btn" id="telegram-btn">
      <img src="tly.png" alt="Telegram" class="btn-icon btn-icon-tg glow-telegram">
      <div class="btn-texts">
        <span class="btn-main">Telegram</span>
        <span class="btn-sub">@moamdbt</span>
      </div>
      <span class="btn-arr">◄</span>
    </a>

    <!-- ins.png -->
    <a href="https://www.instagram.com/lr.7y?igsh=cW1zOGY4aDk4MG56" target="_blank" class="link-btn">
      <img src="ins.png" alt="Instagram" class="btn-icon btn-icon-ig glow-instagram">
      <div class="btn-texts">
        <span class="btn-main">Instagram</span>
        <span class="btn-sub">@lr.7y</span>
      </div>
      <span class="btn-arr">◄</span>
    </a>

  </div>

  <div class="copy-box" id="copyBox" onclick="doCopy()">
    <span style="font-size:16px;flex-shrink:0">🔗</span>
    <span class="copy-url">https://t.me/mf5rh_777</span>
    <span class="copy-badge">📋 نسخ</span>
    <div class="copy-ok" id="copyOk">✓ تم النسخ!</div>
  </div>

  <div class="visitor-wrap">
    <div class="visitor-badge">
      <span>👁</span>
      <span class="v-label">Visitors</span>
      <span class="v-count" id="vCount">0</span>
    </div>
  </div>

</div>

<script>
document.addEventListener('contextmenu',e=>e.preventDefault());

/* cursor */
const dot=document.getElementById('c-dot'),ring=document.getElementById('c-ring');
let mx=window.innerWidth/2,my=window.innerHeight/2,rx=mx,ry=my;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
(function rl(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(rl);})();
document.querySelectorAll('a,.copy-box').forEach(el=>{
  el.addEventListener('mouseenter',()=>{dot.style.width='18px';dot.style.height='18px';dot.style.background='var(--g)';ring.style.width='54px';ring.style.height='54px';});
  el.addEventListener('mouseleave',()=>{dot.style.width='10px';dot.style.height='10px';dot.style.background='var(--b)';ring.style.width='34px';ring.style.height='34px';});
});

/* rain */
const rc=document.getElementById('rainCanvas'),rctx=rc.getContext('2d');
function rsz(){rc.width=window.innerWidth;rc.height=window.innerHeight;}rsz();
const pts=Array.from({length:60},()=>({x:Math.random()*rc.width,y:Math.random()*rc.height,r:Math.random()*1.8+.4,vy:Math.random()*.45+.1,vx:(Math.random()-.5)*.3,a:Math.random()*.45+.1,c:Math.random()>.5?'157,0,255':'0,243,255'}));
function drawRain(){rctx.clearRect(0,0,rc.width,rc.height);pts.forEach(p=>{rctx.beginPath();rctx.arc(p.x,p.y,p.r,0,Math.PI*2);rctx.fillStyle=`rgba(${p.c},${p.a})`;rctx.fill();p.y+=p.vy;p.x+=p.vx;if(p.y>rc.height){p.y=0;p.x=Math.random()*rc.width;}if(p.x<0||p.x>rc.width)p.vx*=-1;});requestAnimationFrame(drawRain);}
rc.style.opacity='1';drawRain();

/* inner network */
const ic=document.getElementById('innerBouncingCanvas'),ictx=ic.getContext('2d'),cont=document.getElementById('mainContainer');
let iw,ih;
function rszI(){iw=cont.offsetWidth;ih=cont.offsetHeight;ic.width=iw;ic.height=ih;}rszI();
const nodes=Array.from({length:18},()=>({x:Math.random()*400,y:Math.random()*500,vx:(Math.random()-.5)*1.2,vy:(Math.random()-.5)*1.2}));
function drawNet(){ictx.clearRect(0,0,iw,ih);nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>iw)n.vx*=-1;if(n.y<0||n.y>ih)n.vy*=-1;});for(let i=0;i<nodes.length;i++){for(let j=i+1;j<nodes.length;j++){const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<100){ictx.beginPath();ictx.strokeStyle=`rgba(157,0,255,${(1-d/100)*.35})`;ictx.lineWidth=.8;ictx.moveTo(nodes[i].x,nodes[i].y);ictx.lineTo(nodes[j].x,nodes[j].y);ictx.stroke();}}}requestAnimationFrame(drawNet);}
ic.style.opacity='1';drawNet();

/* flash + burst */
const fl=document.getElementById('flash');
function flash_(x,y){fl.style.opacity='.18';setTimeout(()=>fl.style.opacity='0',90);for(let i=0;i<8;i++){const sp=document.createElement('div');const ang=Math.random()*360,dist=Math.random()*70+20,sz=Math.random()*5+2;sp.style.cssText=`position:fixed;left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${Math.random()>.5?'#9d00ff':'#00f3ff'};border-radius:50%;pointer-events:none;z-index:9997;filter:blur(1px);transition:transform .5s ease,opacity .5s ease`;document.body.appendChild(sp);requestAnimationFrame(()=>{sp.style.transform=`translate(${Math.cos(ang*Math.PI/180)*dist}px,${Math.sin(ang*Math.PI/180)*dist}px) scale(0)`;sp.style.opacity='0';});setTimeout(()=>sp.remove(),600);}}
document.addEventListener('click',e=>flash_(e.clientX,e.clientY));
setInterval(()=>{if(Math.random()>.68){fl.style.opacity='.1';setTimeout(()=>fl.style.opacity='0',70);}},4200);

/* robot */
window.addEventListener('load',()=>{
  const rob=document.getElementById('cyber-robot');rob.style.opacity='1';
  setTimeout(()=>{const tg=document.getElementById('telegram-btn').getBoundingClientRect(),rr=rob.getBoundingClientRect();rob.style.transition='transform 2s cubic-bezier(.22,1,.5,1)';rob.style.transform=`translate(${tg.left-rr.left-38}px,${tg.top-rr.top}px)`;},1000);
});

/* copy */
function doCopy(){
  navigator.clipboard.writeText('https://t.me/mf5rh_777').then(()=>{
    const ok=document.getElementById('copyOk');ok.classList.add('show');setTimeout(()=>ok.classList.remove('show'),1500);
    flash_(window.innerWidth/2,window.innerHeight/2);
  }).catch(()=>{});
}

/* visitor */
fetch('https://api.counterapi.dev/v1/iraqi_official_page/total_visits/up')
  .then(r=>r.json()).then(d=>{if(d.count)animC(d.count);}).catch(()=>animC(1240));
function animC(target){const el=document.getElementById('vCount');let n=0;const step=Math.max(1,Math.floor(target/60));const t=setInterval(()=>{n=Math.min(n+step,target);el.textContent=n.toLocaleString('ar');if(n>=target)clearInterval(t);},28);}
