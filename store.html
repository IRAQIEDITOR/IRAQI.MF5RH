<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عــراقــي | PRO HUB - الصدمة القصوى</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --shock-purple: #9b30ff;
            --shock-gold: #ffcc44;
            --shock-dark: #0a0a0f;
            --shock-blood: #ff0033;
            --shock-glow: rgba(155, 48, 255, 0.8);
            --robot-size: 58px;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #030003 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            font-family: 'Tajawal', sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* === تأثير الخلفية المدمرة === */
        .destructive-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(155,48,255,0.08) 0px, rgba(155,48,255,0.08) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 5;
        }

        canvas#shockWaveCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 3;
            pointer-events: none;
            opacity: 0.6;
        }

        /* فلاش صاعق */
        .shock-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,204,68,0.6) 0%, rgba(155,48,255,0.9) 100%);
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.05s linear;
        }

        /* === أيقونات ذهبية متحركة === */
        .corner-skull {
            position: absolute;
            z-index: 20;
            width: 110px;
            opacity: 0;
            filter: drop-shadow(0 0 20px var(--shock-gold));
            animation: fadeSkull 1s ease forwards, skullFloat 5s infinite alternate;
        }
        .skull-left {
            bottom: 20px;
            left: 10px;
            animation-delay: 0.3s;
        }
        .skull-right {
            top: 20px;
            right: 10px;
            transform: scaleX(-1);
            animation-delay: 0.6s;
        }
        @keyframes fadeSkull { to { opacity: 0.45; } }
        @keyframes skullFloat { 0% { transform: translateY(0px) rotate(0deg); } 100% { transform: translateY(-18px) rotate(5deg); } }

        /* === الحاوية الثورية === */
        .apocalypse-card {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(16px) saturate(180%);
            border-radius: 48px;
            border: 2px solid;
            border-image: linear-gradient(135deg, var(--shock-gold), var(--shock-purple)) 1;
            max-width: 500px;
            width: 100%;
            padding: 35px 28px 45px;
            position: relative;
            z-index: 100;
            box-shadow: 0 0 60px rgba(155, 48, 255, 0.5), inset 0 0 15px rgba(255, 204, 68, 0.2);
            transform: scale(0.96) translateY(30px);
            opacity: 0;
            animation: brutalReveal 0.55s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        @keyframes brutalReveal {
            0% { opacity: 0; transform: scale(0.85) translateY(60px); filter: blur(8px);}
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0);}
        }

        /* هيدر الصدمة */
        .avatar-shield {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            background: linear-gradient(45deg, var(--shock-gold), var(--shock-purple));
            border-radius: 50%;
            padding: 4px;
            box-shadow: 0 0 40px var(--shock-purple), inset 0 0 10px black;
            animation: pulseBorder 1.8s infinite alternate;
        }
        .avatar-shield img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid black;
        }
        @keyframes pulseBorder {
            0% { box-shadow: 0 0 10px var(--shock-purple); }
            100% { box-shadow: 0 0 35px var(--shock-gold), 0 0 55px var(--shock-purple); }
        }

        .title-wrath {
            text-align: center;
            margin-top: 5px;
            margin-bottom: 10px;
        }
        .title-wrath img {
            width: 80%;
            max-width: 280px;
            filter: drop-shadow(0 0 18px var(--shock-gold)) drop-shadow(0 0 35px var(--shock-purple));
            animation: glitchRage 2.2s infinite;
        }
        @keyframes glitchRage {
            0%, 100% { transform: skew(0deg, 0deg); opacity: 1; text-shadow: none;}
            95% { transform: skew(2deg, 1deg); filter: drop-shadow(0 0 5px red);}
            97% { transform: skew(-2deg, -1deg); filter: drop-shadow(0 0 12px var(--shock-blood));}
        }

        .crystal-doom {
            background: rgba(155, 48, 255, 0.2);
            border: 1px solid rgba(255, 204, 68, 0.6);
            border-radius: 60px;
            padding: 12px 20px;
            margin: 18px auto 25px;
            width: fit-content;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(255, 51, 0, 0.3);
        }
        .crystal-doom span {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 18px;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #ffdd88, #ffaa22, #ff44cc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 6px purple;
        }

        /* أزرار صادمة */
        .btn-warp {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: rgba(0, 0, 0, 0.75);
            border: 1.5px solid;
            border-color: var(--shock-gold);
            border-radius: 50px;
            padding: 16px 20px;
            margin-bottom: 18px;
            font-weight: 800;
            font-size: 18px;
            color: white;
            transition: all 0.2s cubic-bezier(0.2, 1.8, 0.4, 1);
            position: relative;
            overflow: hidden;
            gap: 15px;
        }
        .btn-warp::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,204,68,0.3), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }
        .btn-warp:hover::before { left: 100%; }
        .btn-warp:hover {
            transform: scale(1.07);
            border-color: var(--shock-purple);
            box-shadow: 0 0 28px var(--shock-purple), 0 0 18px var(--shock-gold);
            background: rgba(155, 48, 255, 0.3);
        }
        .btn-icon {
            width: 38px;
            height: 38px;
            object-fit: contain;
            filter: drop-shadow(0 0 6px currentColor);
        }
        .btn-store {
            background: linear-gradient(90deg, #5e1570, #a032ff);
            border-color: #ffcc44;
            box-shadow: 0 0 20px #a032ff;
        }

        /* كوبي مدمّر */
        .copy-destroy {
            background: rgba(255, 204, 68, 0.1);
            border: 1px dashed #ffaa33;
            border-radius: 50px;
            padding: 14px 18px;
            margin: 5px 0 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            font-family: monospace;
            font-size: 15px;
            letter-spacing: 0.5px;
        }
        .copy-destroy:hover {
            background: #ffcc4422;
            border: 1px solid var(--shock-gold);
            transform: scale(1.02);
            box-shadow: 0 0 15px gold;
        }
        .copy-destroy span { color: #ffdd99; }
        .copy-icon-brutal { font-size: 24px; filter: drop-shadow(0 0 5px orange);}

        /* العداد البصمي */
        .visitor-nuke {
            display: flex;
            justify-content: center;
            margin-top: 35px;
            padding: 8px;
        }
        .visitor-nuke .badge {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            padding: 8px 30px;
            border-radius: 80px;
            border: 1px solid var(--shock-gold);
            font-size: 16px;
            font-weight: 800;
        }
        .visitor-nuke .badge span {
            color: var(--shock-gold);
            font-size: 22px;
            text-shadow: 0 0 10px #ffcc44;
            margin-right: 8px;
        }

        /* الروبوت المسيّر المدمر */
        .mech-destroyer {
            position: fixed;
            bottom: 35px;
            right: 25px;
            width: 70px;
            height: 70px;
            z-index: 9999;
            cursor: grab;
            opacity: 0;
            transition: opacity 0.6s, transform 0.2s;
            filter: drop-shadow(0 0 12px var(--shock-blood));
            animation: robotStomp 1.2s infinite alternate;
        }
        .mech-body {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30%, #2b0b3a, #5e1e8a);
            border-radius: 20px 20px 35px 35px;
            border: 2px solid #ffaa33;
            position: relative;
            box-shadow: 0 0 18px #ff0033;
        }
        .mech-eyes {
            display: flex;
            justify-content: space-between;
            width: 45px;
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
        }
        .mech-eye {
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #ff4444, #ff0000);
            border-radius: 50%;
            box-shadow: 0 0 12px red;
            animation: eyeBlink 1.8s infinite;
        }
        .mech-mouth {
            width: 28px;
            height: 8px;
            background: #000;
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 0px;
            background: repeating-linear-gradient(90deg, #ffcc44, #ffcc44 4px, #ff6600 4px, #ff6600 8px);
        }
        .spike {
            width: 12px;
            height: 12px;
            background: #ffcc44;
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            box-shadow: 0 0 5px orange;
        }
        @keyframes robotStomp {
            0% { transform: translateY(0px) rotate(0deg);}
            100% { transform: translateY(-12px) rotate(5deg);}
        }
        @keyframes eyeBlink {
            0%, 90% { transform: scaleY(1);}
            95% { transform: scaleY(0.1);}
        }

        /* إضافات صادمة: فقاعات بلازما */
        .plasma-particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #ff00cc;
            border-radius: 50%;
            filter: blur(2px);
            pointer-events: none;
            z-index: 2;
            opacity: 0.7;
            animation: plasmaDrift 7s linear infinite;
        }
        @keyframes plasmaDrift {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0;}
            20% { opacity: 1;}
            100% { transform: translateY(-20vh) scale(2); opacity: 0;}
        }

        /* Responsive */
        @media (max-width: 500px) {
            .apocalypse-card { padding: 25px 18px 35px; }
            .btn-warp { font-size: 15px; padding: 12px 16px; }
            .mech-destroyer { width: 55px; height: 55px; bottom: 15px; right: 15px; }
        }
    </style>
</head>
<body>

    <div class="destructive-overlay"></div>
    <canvas id="shockWaveCanvas"></canvas>
    <div class="shock-flash" id="flashBang"></div>

    <!-- صور الأيقونات بنفس المسارات الأصلية + صور افتراضية احتياطية باستخدام emojis لكن الصور ستظهر من الارتباطات القديمة -->

    <script>
        (function() {
            // توليد موجات صدمة وكرت مدمر
            const shockCanvas = document.getElementById('shockWaveCanvas');
            const ctx = shockCanvas.getContext('2d');
            let width = window.innerWidth, height = window.innerHeight;
            let shockWaves = [];

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                shockCanvas.width = width;
                shockCanvas.height = height;
            }
            window.addEventListener('resize', () => resizeCanvas());
            resizeCanvas();

            function addShockWave(x, y) {
                shockWaves.push({ x, y, radius: 5, maxRadius: 140, alpha: 0.8, speed: 8 });
            }

            function animateShockwaves() {
                if (!ctx) return;
                ctx.clearRect(0, 0, width, height);
                for (let i = 0; i < shockWaves.length; i++) {
                    let w = shockWaves[i];
                    w.radius += w.speed;
                    w.alpha -= 0.025;
                    if (w.alpha <= 0 || w.radius > w.maxRadius) {
                        shockWaves.splice(i,1);
                        i--;
                        continue;
                    }
                    ctx.beginPath();
                    ctx.arc(w.x, w.y, w.radius, 0, Math.PI * 2);
                    const gradient = ctx.createRadialGradient(w.x, w.y, w.radius*0.2, w.x, w.y, w.radius);
                    gradient.addColorStop(0, `rgba(255, 204, 68, ${w.alpha*0.9})`);
                    gradient.addColorStop(1, `rgba(155, 48, 255, ${w.alpha*0.5})`);
                    ctx.strokeStyle = `rgba(255, 200, 80, ${w.alpha})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
                requestAnimationFrame(animateShockwaves);
            }
            animateShockwaves();

            // فلاش عشوائي صادم
            const flashDiv = document.getElementById('flashBang');
            function randomFlash() {
                flashDiv.style.opacity = '0.45';
                setTimeout(() => { flashDiv.style.opacity = '0'; }, 95);
                // إضافة موجة صدمة عشوائية بناءً على مكان الفأرة إذا أمكن وإلا في المنتصف
                if (window.lastMouseX && window.lastMouseY) {
                    addShockWave(lastMouseX, lastMouseY);
                } else {
                    addShockWave(width/2, height/2);
                }
                // اهتزاز بسيط
                document.body.style.transform = 'translate(2px, -1px)';
                setTimeout(() => { document.body.style.transform = ''; }, 60);
            }
            setInterval(() => {
                if (Math.random() > 0.65) randomFlash();
            }, 4000);

            document.body.addEventListener('mousemove', (e) => {
                window.lastMouseX = e.clientX;
                window.lastMouseY = e.clientY;
            });
            document.body.addEventListener('click', (e) => {
                addShockWave(e.clientX, e.clientY);
                flashDiv.style.opacity = '0.3';
                setTimeout(() => flashDiv.style.opacity = '0', 70);
            });

            // توليد جزيئات بلازما مدمرة
            for (let i = 0; i < 55; i++) {
                let part = document.createElement('div');
                part.classList.add('plasma-particle');
                part.style.left = Math.random() * 100 + '%';
                part.style.animationDelay = Math.random() * 5 + 's';
                part.style.animationDuration
