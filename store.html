<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عراقي | Pro Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* الألوان مستوحاة من الصورة */
            --primary-purple: #4b1d7a; /* البنفسجي العميق */
            --accent-gold: #c5a059;   /* الذهبي المطفي */
            --military-blue: #1a2a40; /* الأزرق العسكري الداكن */
            --bg-dark: #0a0a0c;       /* الخلفية السوداء العميقة */
            --neon-glow: #8e44ad;
            --robot-color: #c5a059;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(75, 29, 122, 0.15) 0%, transparent 80%),
                linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8));
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            padding: 90px 20px 50px; 
            color: #fff;
            overflow-x: hidden; 
            position: relative;
            font-family: 'Tajawal', sans-serif;
            user-select: none;
        }

        /* --- التأثيرات الخلفية --- */
        #rainCanvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
            opacity: 0.6;
        }

        /* --- الحاوية الرئيسية (Glassmorphism) --- */
        .container {
            background: linear-gradient(135deg, rgba(26, 42, 64, 0.4) 0%, rgba(75, 29, 122, 0.2) 100%);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(197, 160, 89, 0.3); /* إطار ذهبي خفيف */
            border-radius: 30px; padding: 50px 30px;
            width: 100%; max-width: 440px; text-align: center;
            position: relative; z-index: 100;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(197, 160, 89, 0.05);
            animation: containerReveal 0.6s ease-out forwards;
        }
        @keyframes containerReveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- الشعار والصورة الشخصية --- */
        .logo-container {
            width: 140px; height: 140px; margin: 0 auto 15px; border-radius: 50%; padding: 4px;
            background: linear-gradient(45deg, var(--accent-gold), var(--primary-purple));
            box-shadow: 0 0 25px rgba(197, 160, 89, 0.4);
        }
        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--bg-dark); }

        .title-img { width: 85%; max-width: 250px; display: block; margin: 0 auto; filter: drop-shadow(0 0 15px var(--primary-purple)); }

        /* --- الأزرار المعدلة بالألوان الجديدة --- */
        .links-wrapper { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        
        .link-btn {
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #fff; 
            background: rgba(255, 255, 255, 0.05);
            padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700;
            border: 1px solid rgba(197, 160, 89, 0.2); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-btn:hover {
            background: var(--primary-purple);
            border-color: var(--accent-gold);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3), 0 0 15px rgba(121, 68, 173, 0.4);
        }

        .store-btn { 
            background: linear-gradient(90deg, #c5a059, #8e6d2d); /* زر المتجر ذهبي */
            color: #000; 
            border: none;
        }
        .store-btn:hover { background: #e2c17d; color: #000; }

        /* --- صندوق النسخ --- */
        .copy-box {
            background: rgba(75, 29, 122, 0.15);
            border: 1px dashed var(--accent-gold);
            border-radius: 10px;
            padding: 12px; margin: 5px 0;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; color: var(--accent-gold);
            cursor: pointer; transition: 0.3s;
        }
        .copy-box:hover { background: rgba(197, 160, 89, 0.1); }

        /* --- عداد الزوار --- */
        .visitor-badge {
            margin-top: 30px; padding: 8px 20px; border-radius: 20px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(197, 160, 89, 0.2);
            font-size: 12px; color: #aaa;
        }
        .visitor-badge span { color: var(--accent-gold); font-weight: bold; margin-right: 5px; }

        /* --- أيقونة الروبوت الذهبي --- */
        .robot-wrapper { position: absolute; top: 40px; left: 50%; margin-left: -22px; width: 45px; height: 45px; z-index: 999; }
        .robot-body { width: 100%; height: 100%; background: var(--accent-gold); border-radius: 10px; box-shadow: 0 0 15px var(--accent-gold); }
        
        .btn-icon { width: 28px; height: 28px; margin-left: 10px; }

    </style>
</head>
<body>

    <canvas id="rainCanvas"></canvas>

    <div id="cyber-robot" class="robot-wrapper">
        <div class="robot-body" style="display: flex; align-items: center; justify-content: center; font-size: 20px;">🎖️</div>
    </div>

    <div class="container" id="mainContainer">
        <div class="logo-container"><img src="lg.png" alt="Avatar" class="logo"></div>
        
        <div class="title-container">
            <img src="vr.png" alt="iraqi" class="title-img">
        </div>
        
        <div style="margin: 10px 0; color: var(--accent-gold); font-weight: bold; letter-spacing: 2px;">PRO HUB OFFICIAL</div>

        <div class="links-wrapper">
            <a href="store.html" class="link-btn store-btn">🛒 ONLINE STORE</a>
            
            <a href="https://www.tiktok.com/@lr.y7_?is_from_webapp=1&sender_device=pc" target="_blank" class="link-btn">
                <img src="tik.png" alt="" class="btn-icon"> TIKTOK
            </a>
            
            <a href="https://t.me/moamdbt" target="_blank" class="link-btn" id="telegram-btn">
                <img src="tly.png" alt="" class="btn-icon"> TELEGRAM CHANNEL
            </a>
            
            <div class="copy-box" onclick="copyTelegramLink()" id="copyBox">
                <span>https://t.me/mf5rh_777</span>
                <span>📋 كبس للنسخ</span>
            </div>

            <a href="https://www.instagram.com/lr.7y?igsh=cW1zOGY4aDk4MG56" target="_blank" class="link-btn">
                <img src="ins.png" alt="" class="btn-icon"> INSTAGRAM
            </a>
        </div>

        <div class="visitor-badge">
            👁 زوار الصفحة: <span id="vCount">0</span>
        </div>
    </div>

    <script>
        // دالة النسخ
        function copyTelegramLink() {
            const text = "https://t.me/mf5rh_777";
            navigator.clipboard.writeText(text).then(() => {
                const box = document.getElementById('copyBox');
                box.style.borderColor = "#fff";
                const originalText = box.innerHTML;
                box.innerHTML = "تم النسخ بنجاح! ✅";
                setTimeout(() => {
                    box.style.borderColor = "var(--accent-gold)";
                    box.innerHTML = originalText;
                }, 1500);
            });
        }

        // تأثير المطر بلون بنفسجي خفيف
        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const drops = [];
        for (let i = 0; i < 50; i++) {
            drops.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                len: Math.random() * 20 + 10,
                speed: Math.random() * 5 + 2
            });
        }

        function drawRain() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(142, 68, 173, 0.2)';
            ctx.lineWidth = 1;
            drops.forEach(d => {
                ctx.beginPath();
                ctx.moveTo(d.x, d.y);
                ctx.lineTo(d.x, d.y + d.len);
                ctx.stroke();
                d.y += d.speed;
                if (d.y > canvas.height) d.y = -20;
            });
            requestAnimationFrame(drawRain);
        }
        drawRain();

        // عداد الزوار
        fetch('https://api.counterapi.dev/v1/iraqi_official_page/total_visits/up')
            .then(res => res.json())
            .then(data => {
                document.getElementById('vCount').innerText = data.count.toLocaleString();
            }).catch(() => {
                document.getElementById('vCount').innerText = "1,500+";
            });
    </script>
</body>
</html>
