    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }

        #rainCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; opacity: 0; transition: opacity 1s ease-in; }
        .lightning { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(200, 0, 255, 0.15); opacity: 0; pointer-events: none; z-index: 9998; transition: opacity 0.1s; }
        .bg-icon { position: absolute; z-index: 150; width: 120px; pointer-events: none; opacity: 0; will-change: transform, opacity; }
        .bg-ae { top: 20px; right: 20px; filter: drop-shadow(0 0 25px var(--neon-purple)); animation: fadeInIcon 0.5s ease forwards 0.2s, float 6s infinite 0.5s; }
        .bg-am { bottom: 85px; left: 20px; border-radius: 50%; filter: drop-shadow(0 0 25px var(--neon-green-dark)); animation: fadeInIcon 0.5s ease forwards 0.2s, float-rev 7s infinite 0.5s; }
        @keyframes fadeInIcon { to { opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes float-rev { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(15px); } }
        .container { background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(15, 0, 25, 0.4) 100%); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(157, 0, 255, 0.2); border-radius: 30px; padding: 50px 30px; width: 100%; max-width: 440px; text-align: center; position: relative; z-index: 100; box-shadow: 0 0 40px rgba(157, 0, 255, 0.1), inset 0 0 10px rgba(255, 255, 255, 0.02); overflow: hidden; margin: 0 auto; opacity: 0; transform: scale(0.95); will-change: transform, opacity; animation: containerReveal 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes containerReveal { to { opacity: 1; transform: scale(1); } }
        #innerBouncingCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0; transition: opacity 1s ease-in; }
        .logo-container, .title-container, .crystal-panel, .link-btn, .visitor-badge-container, .copy-box { position: relative; z-index: 10; opacity: 0; animation: fadeInUpBlur 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes fadeInUpBlur { 0% { opacity: 0; transform: translateY(20px); filter: blur(5px); } 100% { opacity: 1; transform: translateY(0); filter: blur(0); } }
        .logo-container { animation-delay: 0.1s; width: 140px; height: 140px; margin: 0 auto 15px; border-radius: 50%; padding: 4px; background: var(--neon-purple); box-shadow: 0 0 25px var(--neon-purple); }
        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #05000a; }
        .title-container { animation-delay: 0.2s; margin: 15px auto 5px; }
        .title-img { width: 85%; max-width: 250px; display: block; margin: 0 auto; filter: drop-shadow(0 0 25px rgba(157, 0, 255, 0.9)); }
        .glitch { animation: glitch 5s infinite; }
        @keyframes glitch { 0%, 92%, 100% { transform: translate(0); } 94% { transform: translate(2px, -2px); } 96% { transform: translate(-2px, 2px); } }
        .crystal-panel { animation-delay: 0.3s; margin: 5px auto 30px; padding: 12px 25px; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 12px; overflow: hidden; display: inline-block; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); }
        .crystal-text { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; background: linear-gradient(180deg, #ffffff 0%, #9aa0a6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0px 2px 3px rgba(0, 0, 0, 0.8)); position: relative; z-index: 2; }
        .links-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .link-btn { display: flex; align-items: center; justify-content: center; text-decoration: none; color: #fff; background: rgba(0, 0, 0, 0.5); padding: 18px; border-radius: 15px; font-size: 17px; font-weight: 700; border: 1px solid rgba(157, 0, 255, 0.3); transition: all 0.2s ease; }
        .link-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px #b400ff, 0 0 30px #7a00ff; border-color: var(--neon-purple); }
        .store-btn { background: linear-gradient(90deg, #4a00e0, #8e2de2); box-shadow: 0 0 15px rgba(157, 0, 255, 0.3); }
        .btn-icon { width: 44px; height: 44px; margin-right: 12px; object-fit: contain; pointer-events: none; }
        .btn-icon-telegram { transform: scale(1.3); }
        .btn-icon-instagram { transform: scale(1.10); }
        .glow-tiktok { filter: drop-shadow(0 0 8px rgba(220, 220, 220, 0.9)); }

        .copy-box { background: rgba(255, 255, 255, 0.03); border: 1px dashed rgba(0, 243, 255, 0.3); border-radius: 10px; padding: 15px 20px; margin-top: -8px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; font-size: 16px; font-weight: 700; color: rgba(255, 255, 255, 0.7); cursor: pointer; transition: all 0.3s ease; }
        .copy-box:hover { background: rgba(0, 243, 255, 0.1); color: #00f3ff; border-color: #00f3ff; transform: scale(1.02); }
        .copy-icon { font-size: 18px; filter: grayscale(100%); transition: 0.3s; }
        .copy-box:hover .copy-icon { filter: grayscale(0%); }
        .visitor-badge-container { margin-top: 35px; display: flex; justify-content: center; }
        .visitor-badge { display: inline-flex; align-items: center; padding: 10px 25px; font-size: 14px; color: rgba(255, 255, 255, 0.8); background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); letter-spacing: 1px; }
        .visitor-badge span { color: #d866ff; font-weight: 900; margin-left: 5px; text-shadow: 0 0 8px rgba(216, 102, 255, 0.6); font-size: 15px; }
        .robot-wrapper { position: absolute; top: 45px; left: 50%; margin-left: -22.5px; width: var(--robot-size); height: var(--robot-size); z-index: 9999; touch-action: none; cursor: grab; opacity: 0; transition: opacity 0.5s; }
        .robot-mesh { position: relative; width: 100%; height: 100%; animation: robotIdle 3s ease-in-out infinite; }
        .robot-body { width: 100%; height: 80%; background: linear-gradient(135deg, #2b004a, var(--robot-color)); border-radius: 12px 12px 8px 8px; position: relative; box-shadow: 0 0 15px var(--robot-color); border: 1px solid rgba(255, 255, 255, 0.3); }
        .eyes-container { display: flex; justify-content: space-between; width: 22px; position: absolute; top: 30%; left: 50%; transform: translateX(-50%); }

        .robot-mouth { width: 14px; height: 6px; position: absolute; bottom: 25%; left: 50%; transform: translateX(-50%); border-bottom: 2px solid #00f3ff; border-radius: 0 0 10px 10px; }
        .robot-propeller { width: 60%; height: 4px; background: rgba(255, 255, 255, 0.8); position: absolute; top: -6px; left: 50%; transform: translateX(-50%); border-radius: 2px; animation: spinBlade 0.1s linear infinite; }
        .light-beam { position: absolute; top: 50%; left: 22px; height: 35px; background: linear-gradient(to right, rgba(0, 243, 255, 0.8), rgba(0, 243, 255, 0)); transform-origin: left center; opacity: 0; pointer-events: none; transition: opacity 0.3s; clip-path: polygon(0 40%, 100% 0, 100% 100%, 0 60%); z-index: -1; }

        @keyframes spinBlade { 0% { transform: translateX(-50%) rotateY(0deg); } 100% { transform: translateX(-50%) rotateY(360deg); } }
        @keyframes blink { 0%, 96%, 98% { transform: scaleY(1); } 97% { transform: scaleY(0.1); } }
        .robot-spin { animation: quickSpin 0.5s ease-out !important; }
        @keyframes quickSpin { 0% { transform: rotate(0deg) scale(1.2); } 100% { transform: rotate(360deg) scale(1); } }
        .robot-shake { animation: shakeDust 0.6s ease-in-out !important; }

        .robot-red-theme .robot-body { background: linear-gradient(135deg, #4a0000, var(--robot-red)); box-shadow: 0 0 20px var(--robot-red); }
        @media (min-width: 768px) { .bg-ae { right: calc(50% - 320px) !important; } .bg-am { left: calc(50% - 320px) !important; } }
